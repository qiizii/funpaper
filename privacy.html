    <div>
      <p class="eyebrow">Privacy</p>
      <h2>隐私政策</h2>
    </div>
    <article>
      <p>FunPaper 不要求注册账号。App 会在激活 Pro 时向授权服务器发送激活码、随机设备 ID 和 App 版本，用于校验授权和设备数量。</p>
      <p>壁纸下载会访问云端壁纸文件和缩略图地址。我们不会读取你的个人文件内容；本地导入的视频保存在你的 Mac 上。</p>
      <p>购买流程由第三方支付服务处理。支付平台可能根据其隐私政策处理邮箱、支付状态和订单信息。</p>
    </article>
  </main>
